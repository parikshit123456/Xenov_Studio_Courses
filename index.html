<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blender Masterclass | Basic to Advanced</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

    <!-- HERO -->

    <section class="hero">

        <div class="overlay"></div>

        <div class="container">

            <img src="images/thumbnail.jpeg"
                 class="thumbnail"
                 alt="Blender Masterclass">

            <h1>Blender Masterclass</h1>

            <h2>Basic to Advanced</h2>

            <p>
                Learn Blender from scratch and become a professional 3D Artist.
            </p>

        </div>

    </section>


    <!-- Registration -->

    <section class="register">

        <div class="form-box">

            <h2>Register Now</h2>

            <form action="https://formsubmit.co/parikshitnca@gmail.com" method="POST">

                <!-- Disable Captcha -->
                <input type="hidden" name="_captcha" value="false">

                <!-- Thank You Page -->
                <input type="hidden" name="_next"
                value="https://rzp.io/rzp/KIs2B2R">

                <div class="input-group">

                    <label>Name</label>

                    <input
                        type="text"
                        name="Name"
                        required>

                </div>


                <div class="input-group">

                    <label>State</label>

                    <input
                        type="text"
                        name="State"
                        required>

                </div>


                <div class="input-group">

                    <label>Email ID</label>

                    <input
                        type="email"
                        name="Email"
                        required>

                </div>


                <div class="input-group">

                    <label>Phone</label>

                    <input
                        type="tel"
                        name="Phone"
                        required>

                </div>


                <label class="exp-title">

                    Blender Experience

                </label>

                <div class="radio-group">

                    <label>

                        <input
                        type="radio"
                        name="Experience"
                        value="Just Started"
                        required>

                        Just Started

                    </label>

                    <label>

                        <input
                        type="radio"
                        name="Experience"
                        value="Intermediate">

                        Intermediate

                    </label>

                    <label>

                        <input
                        type="radio"
                        name="Experience"
                        value="Pro">

                        Pro

                    </label>

                </div>

                <button type="submit" class="submit-btn">Register Now</button>
            </form>

        </div>

    </section>

<script src="script.js"></script>

</body>
</html>
